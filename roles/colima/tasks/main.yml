---
- name: Install Colima and Docker CLI tools
  community.general.homebrew:
    name:
      - colima
      - docker
      - docker-compose
      - docker-buildx
    state: present
    path: "{{ brew_prefix }}/bin"

- name: Create Docker config directory
  file:
    path: "{{ ansible_facts.env.HOME }}/.docker"
    state: directory
    mode: "0755"

- name: Check if Docker config.json exists
  stat:
    path: "{{ ansible_facts.env.HOME }}/.docker/config.json"
  register: docker_config_stat

- name: Read existing Docker config.json
  slurp:
    src: "{{ ansible_facts.env.HOME }}/.docker/config.json"
  register: docker_config_raw
  when: docker_config_stat.stat.exists

- name: Register Docker buildx CLI plugin directory
  copy:
    content: >-
      {{
        (docker_config_stat.stat.exists | ternary(docker_config_raw.content | b64decode | from_json, {}))
        | combine({'cliPluginsExtraDirs': [brew_prefix + '/lib/docker/cli-plugins']})
        | to_nice_json
      }}
    dest: "{{ ansible_facts.env.HOME }}/.docker/config.json"
    mode: "0644"

- name: Create Colima template directory
  file:
    path: "{{ ansible_facts.env.HOME }}/.colima/_templates"
    state: directory
    mode: "0755"

- name: Template Colima config
  template:
    src: colima.yaml.j2
    dest: "{{ ansible_facts.env.HOME }}/.colima/_templates/default.yaml"
    mode: "0644"

- name: Create LaunchAgents directory
  file:
    path: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents"
    state: directory
    mode: "0755"

- name: Install Colima LaunchAgent for auto-start
  template:
    src: com.github.colima.plist.j2
    dest: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.github.colima.plist"
    mode: "0644"

- name: Check if Colima LaunchAgent is loaded
  command: launchctl list com.github.colima
  register: launchctl_check
  failed_when: false
  changed_when: false

- name: Load Colima LaunchAgent
  command: launchctl load -w "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.github.colima.plist"
  when: launchctl_check.rc != 0
