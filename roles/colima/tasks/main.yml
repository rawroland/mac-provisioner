---
- name: Install Colima and Docker CLI tools
  community.general.homebrew:
    name:
      - colima
      - docker
      - docker-compose
      - docker-buildx
    state: present
    path: "{{ brew_prefix }}/bin"

- name: Create Docker config directory
  file:
    path: "{{ ansible_facts.env.HOME }}/.docker"
    state: directory
    mode: "0755"

- name: Check if Docker config.json exists
  stat:
    path: "{{ ansible_facts.env.HOME }}/.docker/config.json"
  register: docker_config_stat

- name: Read existing Docker config.json
  slurp:
    src: "{{ ansible_facts.env.HOME }}/.docker/config.json"
  register: docker_config_raw
  when: docker_config_stat.stat.exists

- name: Register Docker buildx CLI plugin directory
  copy:
    content: >-
      {{
        (docker_config_stat.stat.exists | ternary(docker_config_raw.content | b64decode | from_json, {}))
        | combine({'cliPluginsExtraDirs': [brew_prefix + '/lib/docker/cli-plugins']})
        | to_nice_json
      }}
    dest: "{{ ansible_facts.env.HOME }}/.docker/config.json"
    mode: "0644"

- name: Check if Colima is running
  command: "{{ brew_prefix }}/bin/colima status"
  register: colima_status
  failed_when: false
  changed_when: false

- name: Start Colima
  command: >-
    {{ brew_prefix }}/bin/colima start
    --cpu {{ colima_cpu }}
    --memory {{ colima_memory }}
    --disk {{ colima_disk }}
    --arch host
    --runtime docker
  when: colima_status.rc != 0
