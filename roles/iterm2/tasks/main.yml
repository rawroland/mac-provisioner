---
- name: Create iTerm2 DynamicProfiles directory
  file:
    path: "{{ ansible_env.HOME }}/Library/Application Support/iTerm2/DynamicProfiles"
    state: directory
    mode: "0755"

- name: Install green-on-black dynamic profile
  template:
    src: profile.json.j2
    dest: "{{ ansible_env.HOME }}/Library/Application Support/iTerm2/DynamicProfiles/mac-provisioner.json"
    mode: "0644"

- name: Download iTerm2 zsh shell integration
  get_url:
    url: https://iterm2.com/shell_integration/zsh
    dest: "{{ ansible_env.HOME }}/.iterm2_shell_integration.zsh"
    mode: "0644"
    force: false
